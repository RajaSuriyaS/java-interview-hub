name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint, syntax-check & docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22          # required for the built-in node:sqlite module
          cache: npm

      - name: Install deps
        run: npm ci || npm install

      - name: Syntax-check all JS
        run: |
          node --check server.js
          node --check db.js
          node --check auth.js
          node --check billing.js
          node --check public/js/curriculum.js
          node --check public/js/app.js

      - name: Validate curriculum data shape
        run: |
          node -e "
            const fs=require('fs');
            const src=fs.readFileSync('public/js/curriculum.js','utf8').replace('const CURRICULUM','global.CURRICULUM');
            eval(src);
            let bad=[];
            CURRICULUM.forEach(p=>{
              if(!p.id||!p.title||!Array.isArray(p.modules)) bad.push('phase '+p.id);
              p.modules.forEach(m=>{
                if(!m.id||!m.title||typeof m.hours!=='number') bad.push('module '+m.id);
                // validate flashcards and code entries at BOTH module and section level
                (m.sections||[m]).forEach(s=>{
                  (s.flashcards||[]).forEach(f=>{ if(typeof f.q!=='string'||typeof f.a!=='string') bad.push('card '+m.id); });
                  (s.code||[]).forEach(c=>{ const code=typeof c==='string'?c:c.code; if(typeof code!=='string') bad.push('code '+m.id); });
                });
              });
            });
            const ids=CURRICULUM.flatMap(p=>p.modules.map(m=>m.id));
            const dupes=ids.filter((x,i)=>ids.indexOf(x)!==i);
            if(bad.length||dupes.length){ console.error('FAIL', {bad, dupes}); process.exit(1); }
            console.log('OK:', CURRICULUM.length, 'phases,', ids.length, 'modules');
          "

      - name: Boot smoke test
        run: |
          PORT=3099 DATA_DIR="$RUNNER_TEMP/jih-data" \
            node --disable-warning=ExperimentalWarning server.js &
          PID=$!
          sleep 2
          body=$(curl -s http://localhost:3099/health)
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3099/health)
          kill $PID || true
          echo "health: $code $body"
          [ "$code" = "200" ] || { echo "health check failed: $code"; exit 1; }
          echo "$body" | grep -q '"db":true' || { echo "sqlite did not initialise"; exit 1; }
          echo "health OK"

      - name: Docker build
        run: docker build -t java-interview-hub:ci .
