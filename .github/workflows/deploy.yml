name: Deploy to VPS

# Auto-deploys after CI succeeds on main, or manually via Actions → Run workflow.
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST       e.g. 178.105.239.120
#   VPS_SSH_USER   e.g. root
#   VPS_SSH_KEY    the PRIVATE key whose public half is in the VPS authorized_keys
# Optional:
#   VPS_SSH_PORT   defaults to 22
#   DEPLOY_STANDALONE   "1" to also run the bundled Caddy (fresh VPS); omit on shared VPS
#   HEALTH_URL     e.g. https://javahub.duckdns.org/health  (verified after deploy)

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    # The `secrets` context cannot be used in step `if:` conditions, so expose the
    # health URL through the env context (which is allowed in `if:`).
    env:
      HEALTH_URL: ${{ secrets.HEALTH_URL }}
    # Skip entirely when secrets aren't configured (VPS uses systemd timer auto-deploy instead)
    if: >
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success') &&
      vars.DEPLOY_ENABLED == 'true'
    steps:
      - name: Check required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.VPS_HOST }}" ]     && MISSING="$MISSING VPS_HOST"
          [ -z "${{ secrets.VPS_SSH_USER }}" ] && MISSING="$MISSING VPS_SSH_USER"
          [ -z "${{ secrets.VPS_SSH_KEY }}" ]  && MISSING="$MISSING VPS_SSH_KEY"
          if [ -n "$MISSING" ]; then
            echo "::warning::Missing GitHub secrets:$MISSING — SSH deploy skipped."
            echo "The VPS auto-deploys via systemd git-poll timer within 60s of a push."
            echo "To enable GitHub Actions deploy: set secrets + add DEPLOY_ENABLED=true variable."
            exit 0
          fi
          echo "All required secrets present ✓"

      - name: Deploy over SSH (git pull + docker compose build)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT != '' && secrets.VPS_SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 20m
          envs: DEPLOY_STANDALONE
          script: |
            set -euo pipefail
            REPO=/root/java-interview-hub
            if [ ! -d "$REPO/.git" ]; then
              echo "First deploy: cloning repo…"
              git clone https://github.com/RajaSuriyaS/java-interview-hub.git "$REPO"
            fi
            cd "$REPO"
            for i in 1 2 3; do git fetch origin main && break; echo "fetch retry $i"; sleep 10; done
            git reset --hard origin/main
            chmod +x deploy/*.sh
            if [ ! -f deploy/.env ]; then
              echo "::warning::deploy/.env not found — copying example. Fill in DuckDNS token!"
              cp deploy/.env.example deploy/.env
            fi
            export STANDALONE="${DEPLOY_STANDALONE:-0}"
            ./deploy/redeploy.sh
        env:
          DEPLOY_STANDALONE: ${{ secrets.DEPLOY_STANDALONE }}

      - name: Verify health
        if: ${{ env.HEALTH_URL != '' }}
        run: |
          echo "Probing $HEALTH_URL …"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo 000)
            if [ "$code" = "200" ]; then echo "App healthy (HTTP 200) ✓"; exit 0; fi
            echo "attempt $i: HTTP $code; retry in 5s"; sleep 5
          done
          echo "::error::Health check never returned 200"; exit 1
